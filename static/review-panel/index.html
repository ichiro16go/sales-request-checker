<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI依頼レビュー</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main>
    <div class="toolbar">
      <button id="refresh" type="button">再レビュー</button>
      <button id="post" type="button">コメント投稿</button>
    </div>
    <div id="status" class="status">読み込み中...</div>
    <section id="summary" class="summary" hidden></section>
    <section id="questions" hidden>
      <h2>追記するとよい情報</h2>
      <ul id="question-list"></ul>
    </section>
    <section id="improved" hidden>
      <h2>依頼文の改善案</h2>
      <pre id="improved-text"></pre>
    </section>
    <section id="similar" hidden>
      <h2>📎 類似チケット</h2>
      <p id="similar-keywords" class="keywords"></p>
      <ul id="similar-list"></ul>
    </section>
  </main>
  <script type="module" src="./main.js"></script>
</body>
</html>
